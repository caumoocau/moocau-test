<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>푸앙이의 K-MOOC 강의 추천 테스트</title>
<meta property="og:title" content="나에게 딱 맞는 K-MOOC 강의는? | 푸앙이의 강의 추천 테스트">
<meta property="og:description" content="1분 테스트로 알아보는 나의 학습 유형 & 중앙대학교 K-MOOC 추천 강의!">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --navy:#143365; --blue:#2B95C3; --sky:#3DB1D3; --light:#6BBEE2;
  --pink:#DEACC5; --pink-light:#F2D6E3; --beige:#D7BCA1; --white:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:linear-gradient(160deg,var(--navy) 0%,#1d4a8a 55%,var(--blue) 100%);
  min-height:100vh;display:flex;justify-content:center;color:var(--navy);
}
.app{width:100%;max-width:480px;min-height:100vh;padding:20px 16px 40px;display:flex;flex-direction:column}
.screen{display:none;animation:fadeIn .45s ease}
.screen.active{display:flex;flex-direction:column;flex:1}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}

/* ── 시작 화면 ── */
.start-card{background:var(--white);border-radius:28px;padding:44px 28px 36px;text-align:center;margin:auto 0;box-shadow:0 18px 50px rgba(0,0,0,.28)}
.badge{display:inline-block;background:var(--pink-light);color:var(--navy);font-size:13px;font-weight:700;padding:7px 16px;border-radius:999px;letter-spacing:.4px}
.start-card h1{font-size:27px;font-weight:800;line-height:1.35;margin:16px 0 6px}
.start-card h1 .hl{color:var(--blue)}
.start-card .sub{font-size:14.5px;color:#5b6b85;line-height:1.6}
.mascot{width:190px;margin:22px auto 8px;display:block;animation:bob 2.6s ease-in-out infinite}
.speech{display:inline-block;background:var(--pink-light);border-radius:16px;padding:9px 16px;font-size:13.5px;font-weight:600;color:var(--navy);position:relative;margin-bottom:20px}
.speech:after{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-bottom-color:var(--pink-light);border-top:0}
.btn{display:block;width:100%;border:none;cursor:pointer;font-family:inherit;border-radius:16px;padding:17px;font-size:17px;font-weight:700;transition:transform .15s,box-shadow .15s;text-align:center;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--navy);color:var(--white);box-shadow:0 8px 20px rgba(20,51,101,.35)}
.btn-primary:hover{box-shadow:0 10px 26px rgba(20,51,101,.5)}
.meta{margin-top:14px;font-size:12.5px;color:#8fa0b8}

/* ── 질문 화면 ── */
.quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.quiz-mascot{width:52px;height:auto;flex-shrink:0}
.progress-wrap{flex:1}
.progress-label{color:var(--pink-light);font-size:12.5px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar{height:10px;background:rgba(255,255,255,.25);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--light),var(--pink));border-radius:999px;transition:width .35s ease;width:0}
.q-card{background:var(--white);border-radius:24px;padding:30px 24px;box-shadow:0 14px 40px rgba(0,0,0,.25);animation:fadeIn .4s ease}
.q-num{color:var(--sky);font-weight:800;font-size:14px;letter-spacing:1px}
.q-text{font-size:20px;font-weight:800;line-height:1.45;margin:10px 0 22px;word-break:keep-all}
.opt{display:block;width:100%;text-align:left;background:#f4f8fc;border:2px solid transparent;border-radius:15px;padding:16px 18px;font-size:15.5px;font-weight:600;color:var(--navy);cursor:pointer;font-family:inherit;line-height:1.45;word-break:keep-all;transition:all .15s}
.opt+.opt{margin-top:11px}
.opt:hover{background:var(--pink-light);border-color:var(--pink)}
.opt:active{transform:scale(.98)}

/* ── 결과 화면 ── */
.result-card{background:var(--white);border-radius:26px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.3)}
.result-hero{background:linear-gradient(150deg,var(--sky),var(--blue) 60%,var(--navy));text-align:center;padding:30px 22px 26px;color:var(--white)}
.result-hero .r-label{font-size:13px;font-weight:600;opacity:.85;letter-spacing:.6px}
.result-hero img{width:170px;margin:14px auto 6px;display:block;animation:pop .6s ease}
.r-type{font-size:26px;font-weight:800;margin-top:4px}
.r-tag{display:inline-block;margin-top:10px;background:rgba(255,255,255,.2);border-radius:999px;padding:6px 16px;font-size:13.5px;font-weight:600}
.result-body{padding:26px 22px 30px}
.r-desc{font-size:15px;line-height:1.75;color:#3c4a63;word-break:keep-all}
.chemi{display:flex;gap:10px;margin:20px 0 4px}
.chemi-box{flex:1;border-radius:14px;padding:12px;text-align:center;font-size:12.5px;line-height:1.5}
.chemi-box b{display:block;font-size:13.5px;margin-top:2px}
.chemi-good{background:var(--pink-light)}
.chemi-bad{background:#eef3f9}
.sec-title{font-size:17px;font-weight:800;margin:26px 0 12px;display:flex;align-items:center;gap:8px}
.sec-title:before{content:'';width:5px;height:19px;background:var(--pink);border-radius:3px}
.course{border:2px solid #e3ecf5;border-radius:16px;padding:16px 16px 14px;margin-bottom:11px;transition:border-color .15s}
.course:hover{border-color:var(--light)}
.course.main{border-color:var(--sky);background:linear-gradient(150deg,#f2fafd,#fff 55%)}
.c-chips{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.chip{font-size:11.5px;font-weight:700;border-radius:999px;padding:4px 10px}
.chip-best{background:var(--navy);color:var(--white)}
.chip-field{background:var(--pink-light);color:var(--navy)}
.chip-level{background:#e8f4fa;color:var(--blue)}
.c-title{font-size:16.5px;font-weight:800;line-height:1.4;word-break:keep-all}
.c-desc{font-size:13.5px;color:#5b6b85;line-height:1.6;margin-top:6px;word-break:keep-all}
a.course{display:block;text-decoration:none;color:inherit;cursor:pointer}
a.course:hover{border-color:var(--blue);box-shadow:0 6px 18px rgba(43,149,195,.18)}
.c-link{margin-top:10px;font-size:13.5px;font-weight:800;color:var(--blue)}
.actions{margin-top:24px;display:flex;flex-direction:column;gap:10px}
.btn-outline{background:var(--white);color:var(--navy);border:2px solid var(--navy)}
.btn-pink{background:var(--pink);color:var(--navy)}
.btn-sub{background:#eef3f9;color:var(--navy);font-size:15px;padding:14px}
.footer{text-align:center;margin-top:22px;color:rgba(255,255,255,.75);font-size:12px;line-height:1.7}
.toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 22px;border-radius:999px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.35);transition:transform .3s;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

let idx=0, scores={};
function startQuiz(){ idx=0; scores={PHIL:0,CULT:0,AI:0,DATA:0,WELL:0,EDU:0}; show('screen-quiz'); render(); }
function render(){
  const q=QUESTIONS[idx];
  document.getElementById('q-num').textContent='Q'+(idx+1);
  document.getElementById('q-text').innerHTML=q.q.replace(/\n/g,'<br>');
  document.getElementById('p-count').textContent=(idx+1)+' / '+QUESTIONS.length;
  document.getElementById('p-fill').style.width=((idx)/QUESTIONS.length*100)+'%';
  const box=document.getElementById('q-opts'); box.innerHTML='';
  q.opts.forEach(([label,type])=>{
    const b=document.createElement('button'); b.className='opt'; b.textContent=label;
    b.onclick=()=>{ scores[type]+=(q.w||1); next(); };
    box.appendChild(b);
  });
  const card=document.getElementById('q-card');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='';
}
function next(){
  idx++;
  if(idx<QUESTIONS.length){ render(); }
  else{ document.getElementById('p-fill').style.width='100%'; setTimeout(showResult,250); }
}
function showResult(){
  const order=["PHIL","CULT","AI","DATA","WELL","EDU"];
  const best=order.reduce((a,b)=>scores[b]>scores[a]?b:a);
  const r=RESULTS[best];
  document.getElementById('r-img').src=IMGS[r.img];
  document.getElementById('r-type').textContent=r.name;
  document.getElementById('r-tagline').textContent='"'+r.tagline+'"';
  document.getElementById('r-desc').textContent=r.desc;
  document.getElementById('r-good').textContent=r.good;
  document.getElementById('r-bad').textContent=r.bad;
  const box=document.getElementById('r-courses'); box.innerHTML='';
  r.courses.forEach(c=>{
    const d=document.createElement(c.url?'a':'div');
    d.className='course'+(c.main?' main':'');
    if(c.url){ d.href=c.url; d.target='_blank'; d.rel='noopener'; }
    d.innerHTML='<div class="c-chips">'+(c.main?'<span class="chip chip-best">푸앙이 PICK</span>':'')
      +'<span class="chip chip-field">'+c.field+'</span><span class="chip chip-level">'+c.level+'</span></div>'
      +'<div class="c-title">'+c.title+'</div><div class="c-desc">'+c.desc+'</div>'
      +(c.url?'<div class="c-link">강의 보러 가기 →</div>':'');
    box.appendChild(d);
  });
  show('screen-result'); window.scrollTo({top:0});
}
function resetQuiz(){ show('screen-start'); window.scrollTo({top:0}); }
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function shareResult(){
  const isWeb = location.protocol==='http:'||location.protocol==='https:';
  const text = '나에게 딱 맞는 K-MOOC 강의는? 푸앙이의 1분 테스트!';
  const payload = isWeb ? text+'\n'+location.href : text;
  if(isWeb && navigator.share){
    navigator.share({title:'푸앙이의 K-MOOC 강의 추천 테스트',text,url:location.href}).catch(()=>copyText(payload));
  } else { copyText(payload); }
}
function copyText(str){
  const ok=()=>toast(location.protocol==='file:'?'공유 문구가 복사되었어요! (배포 후엔 링크가 복사돼요)':'링크가 복사되었어요!');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(str).then(ok).catch(()=>legacyCopy(str,ok));
  } else { legacyCopy(str,ok); }
}
function legacyCopy(str,done){
  const ta=document.createElement('textarea');
  ta.value=str; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){ toast('복사에 실패했어요 😢'); }
  document.body.removeChild(ta);
}
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200);
}
